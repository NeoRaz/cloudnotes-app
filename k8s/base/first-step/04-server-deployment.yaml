apiVersion: apps/v1
kind: Deployment
metadata:
  name: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: server
  template:
    metadata:
      labels:
        app: server
    spec:
      containers:
        - name: php-fpm
          image: cloudnotes-server
          imagePullPolicy: IfNotPresent
          workingDir: /var/www/html
          resources:
            limits:
              cpu: "500m"
              memory: "1Gi"
            requests:
              cpu: "250m"
              memory: "512Mi"
          ports:
            - containerPort: 9000
          envFrom:
            - secretRef:
                name: cloudnotes-env
