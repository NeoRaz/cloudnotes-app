apiVersion: apps/v1
kind: Deployment
metadata:
  name: cognee
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cognee
  template:
    metadata:
      labels:
        app: cognee
    spec:
      containers:
        - name: cognee
          image: cloudnotes-cognee
          imagePullPolicy: IfNotPresent
          env:
            # Cognee System Overrides
            - name: ENABLE_BACKEND_ACCESS_CONTROL
              value: "false"
            - name: CACHING
              value: "false"
            - name: COGNEE_SKIP_CONNECTION_TEST
              value: "true"
            - name: COGNEE_SYSTEM_PATH
              value: "/root/.cognee/.cognee_system"
            - name: COGNEE_DATA_PATH
              value: "/root/.cognee/.data_storage"
            - name: STRUCTURED_OUTPUT_FRAMEWORK
              value: "instructor"
            - name: MAX_CHUNK_SIZE
              value: "400"
            - name: CHUNK_OVERLAP
              value: "50"
            - name: BAML_LLM_PROVIDER
              value: "ollama"
            - name: BAML_LLM_ENDPOINT
              value: "http://ai:8000/v1"
            - name: BAML_LLM_MODEL
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: AI_LLM_MODEL } }
            - name: BAML_LLM_API_KEY
              value: "ollama"

            # Relational Storage (Postgres)
            - name: DB_PROVIDER
              value: "postgres"
            - name: DB_HOST
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: PG_HOST } }
            - name: DB_PORT
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: PG_PORT } }
            - name: DB_NAME
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: PG_DATABASE } }
            - name: DB_USERNAME
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: PG_USERNAME } }
            - name: DB_PASSWORD
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: PG_PASSWORD } }
            
            # Vector Storage (PGVector)
            - name: VECTOR_DB_PROVIDER
              value: "pgvector"

            # Graph Storage (Neo4j)
            - name: GRAPH_DATABASE_PROVIDER
              value: "neo4j"
            - name: GRAPH_DATABASE_URL
              value: "bolt://neo4j:7687"
            - name: GRAPH_DATABASE_USERNAME
              value: "neo4j"
            - name: GRAPH_DATABASE_PASSWORD
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: GRAPH_DATABASE_PASSWORD, optional: true } }
              
            # LLM Config
            - name: LLM_PROVIDER
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: AI_MODEL_PROVIDER } }
            - name: LLM_ENDPOINT
              value: "http://ai:8000/v1"
            - name: LLM_MODEL
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: AI_LLM_MODEL } }
            - name: LLM_API_KEY
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: AI_API_KEY } }
              
            # Embedding Config
            - name: EMBEDDING_PROVIDER
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: AI_MODEL_PROVIDER } }
            - name: EMBEDDING_MODEL
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: AI_EMBEDDING_MODEL } }
            - name: EMBEDDING_DIMENSIONS
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: AI_EMBEDDING_DIM } }
            - name: EMBEDDING_ENDPOINT
              valueFrom: { secretKeyRef: { name: cloudnotes-env, key: COGNEE_EMBEDDING_ENDPOINT } }
            - name: HUGGINGFACE_TOKENIZER
              value: "nomic-ai/nomic-embed-text-v1.5"
          volumeMounts:
            - name: cognee-storage
              mountPath: /root/.cognee
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
      volumes:
        - name: cognee-storage
          persistentVolumeClaim:
            claimName: cognee-pvc
