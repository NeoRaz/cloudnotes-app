name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: cloud_notes_test
          MYSQL_USER: laravel
          MYSQL_PASSWORD: 123
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      pgvector:
        image: ankane/pgvector:latest
        env:
          POSTGRES_DB: cloudnotes_vector
          POSTGRES_USER: laravel
          POSTGRES_PASSWORD: 123
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U laravel -d cloudnotes_vector"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          extensions: mbstring, bcmath, pdo_mysql, pdo_pgsql
          coverage: none

      - name: Install Composer dependencies
        working-directory: ./server
        run: composer install --no-progress --no-interaction --prefer-dist

      - name: Prepare .env for testing
        working-directory: ./server
        run: |
          cp .env.example .env
          php -r "file_put_contents('.env', preg_replace('/DB_HOST=.*/', 'DB_HOST=127.0.0.1', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/DB_DATABASE=.*/', 'DB_DATABASE=cloud_notes_test', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/DB_USERNAME=.*/', 'DB_USERNAME=laravel', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/DB_PASSWORD=.*/', 'DB_PASSWORD=123', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/PG_HOST=.*/', 'PG_HOST=127.0.0.1', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/PG_PORT=.*/', 'PG_PORT=5432', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/PG_DATABASE=.*/', 'PG_DATABASE=cloudnotes_vector', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/PG_USERNAME=.*/', 'PG_USERNAME=laravel', file_get_contents('.env')));"
          php -r "file_put_contents('.env', preg_replace('/PG_PASSWORD=.*/', 'PG_PASSWORD=123', file_get_contents('.env')));"

      - name: Wait for MySQL
        run: |
          for i in {1..10}; do
            if mysqladmin ping -h "127.0.0.1" -u laravel -p123 --silent; then
              echo "✅ MySQL is ready"
              break
            fi
            echo "⏳ Waiting for MySQL..."
            sleep 5
          done

      - name: Wait for Postgres
        run: |
          for i in {1..10}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U laravel -d cloudnotes_vector; then
              echo "✅ Postgres is ready"
              break
            fi
            echo "⏳ Waiting for Postgres..."
            sleep 5
          done

      - name: Run Migrations
        working-directory: ./server
        run: php artisan migrate --env=testing --force

      - name: Run Seeders
        working-directory: ./server
        run: php artisan db:seed --force
        
      - name: Run Tests
        working-directory: ./server
        run: php artisan test

  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        working-directory: ./client
        run: npm install

      - name: Run Lint
        working-directory: ./client
        run: npm run lint --if-present

      - name: Run Tests (ignore if none)
        working-directory: ./client
        run: npm test -- --watchAll=false --passWithNoTests || true
