name: CloudNotes CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ENVIRONMENT: prod
      PROJECT_ROOT: ${{ github.workspace }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      DOCKER_EMAIL: ${{ secrets.DOCKER_EMAIL }}
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ env.DOCKER_PASSWORD }}

      - name: ⚙️ Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: 🔐 Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${KUBE_CONFIG_DATA}" | base64 --decode > $HOME/.kube/config

      - name: 🧩 Generate production env file
        run: |
          mkdir -p ./deployment/envs
          cat <<EOF > ./deployment/envs/prod.env
          # Namespace
          NAMESPACE=cloudnotes-prod

          # Laravel app
          APP_KEY=${{ secrets.APP_KEY }}
          APP_ENV=prod
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          APP_TIMEZONE=UTC
          APP_LOCALE=en
          APP_FALLBACK_LOCALE=en
          APP_FAKER_LOCALE=en_US

          # Database
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_CONNECTION=mysql
          DB_PORT=3306

          # PG Vector DB
          PG_DB_CONNECTION=pgsql
          PG_HOST=${{ secrets.PG_HOST }}
          PG_PORT=5432
          PG_DATABASE=${{ secrets.PG_DATABASE }}
          PG_USERNAME=${{ secrets.PG_USERNAME }}
          PG_PASSWORD=${{ secrets.PG_PASSWORD }}
          GRAPH_DATABASE_PASSWORD=${{ secrets.GRAPH_DATABASE_PASSWORD }}

          # AI Service Configuration
          ENABLE_AI=${{ secrets.ENABLE_AI }}
          COGNEE_SERVICE_URL=${{ secrets.COGNEE_SERVICE_URL }}
          AI_MODEL_PROVIDER=${{ secrets.AI_MODEL_PROVIDER }}
          AI_ENDPOINT_URL=${{ secrets.AI_ENDPOINT_URL }}
          COGNEE_EMBEDDING_ENDPOINT=${{ secrets.COGNEE_EMBEDDING_ENDPOINT }}
          AI_API_KEY=${{ secrets.AI_API_KEY }}
          AI_LLM_MODEL=${{ secrets.AI_LLM_MODEL }}
          AI_EMBEDDING_MODEL=${{ secrets.AI_EMBEDDING_MODEL }}
          AI_EMBEDDING_DIM=${{ secrets.AI_EMBEDDING_DIM }}
          HUGGINGFACE_TOKENIZER=${{ secrets.HUGGINGFACE_TOKENIZER }}

          # Redis
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_CLIENT=phpredis
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          REDIS_PORT=6379

          # Mail
          MAIL_MAILER=smtp
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
          MAIL_ENCRYPTION=${{ secrets.MAIL_ENCRYPTION }}
          MAIL_FROM_ADDRESS=${{ secrets.MAIL_FROM_ADDRESS }}
          MAIL_FROM_NAME="CloudNotes"
          BREVO_API_KEY=${{ secrets.BREVO_API_KEY }}

          # Cache / Queue / Session
          CACHE_STORE=database
          CACHE_PREFIX=
          QUEUE_CONNECTION=redis
          SESSION_DRIVER=database
          FILESYSTEM_DISK=s3

          # S3 / MinIO
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION=${{ secrets.AWS_DEFAULT_REGION }}
          AWS_BUCKET=${{ secrets.AWS_BUCKET }}
          AWS_ENDPOINT=${{ secrets.AWS_ENDPOINT }}
          AWS_USE_PATH_STYLE_ENDPOINT=${{ secrets.AWS_USE_PATH_STYLE_ENDPOINT }}
          AWS_URL=${{ secrets.AWS_URL }}

          SESSION_LIFETIME=120
          SESSION_ENCRYPT=false
          SESSION_PATH=/
          SESSION_DOMAIN=null

          # React client
          REACT_APP_ENABLE_AI=${{ secrets.REACT_APP_ENABLE_AI }}
          REACT_APP_NODE_ENV=production
          REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
          REACT_APP_CLIENT_ID=${{ secrets.REACT_APP_CLIENT_ID }}
          REACT_APP_CLIENT_SECRET=${{ secrets.REACT_APP_CLIENT_SECRET }}
          REACT_APP_SECRET_KEY=Cloud-Notes-Client

          # Logging
          LOG_CHANNEL=stderr

          # Passport Keys
          PASSPORT_PRIVATE_KEY="${{ secrets.PASSPORT_PRIVATE_KEY }}"
          PASSPORT_PUBLIC_KEY="${{ secrets.PASSPORT_PUBLIC_KEY }}"

          # Dockerhub creds for prod environment
          DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD=${{ secrets.DOCKER_PASSWORD }}
          DOCKER_EMAIL=${{ secrets.DOCKER_EMAIL }}
          EOF

      - name: 📦 Deploy backend (first step)
        run: |
          chmod +x ./deployment/scripts/deploy-first-step.sh
          ./deployment/scripts/deploy-first-step.sh $ENVIRONMENT

      - name: 💻 Build and deploy frontend (second step)
        run: |
          chmod +x ./deployment/scripts/deploy-second-step.sh
          ./deployment/scripts/deploy-second-step.sh $ENVIRONMENT
