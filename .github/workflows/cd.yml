name: CloudNotes App CD (Build & Push)

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 1. Build and Push Server Image
      - name: 🛠️ Build & Push Server
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cloudnotes-server:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/cloudnotes-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 2. Build and Push AI Image
      - name: 🛠️ Build & Push AI
        uses: docker/build-push-action@v5
        with:
          context: ./ai
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cloudnotes-ai:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/cloudnotes-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 3. Build and Push Client Image
      - name: 🛠️ Build & Push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/cloudnotes-client:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/cloudnotes-client:latest
          build-args: |
            REACT_APP_ENV=production
            REACT_APP_API_BASE_URL=${{ secrets.REACT_APP_API_BASE_URL }}
            REACT_APP_CLIENT_ID=${{ secrets.REACT_APP_CLIENT_ID }}
            REACT_APP_CLIENT_SECRET=${{ secrets.REACT_APP_CLIENT_SECRET }}
            REACT_APP_SECRET_KEY=${{ secrets.REACT_APP_SECRET_KEY }}
            REACT_APP_ENABLE_AI=${{ secrets.REACT_APP_ENABLE_AI }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 4. Trigger Deployment in cloudnotes-infra Repository
      - name: 🚀 Trigger Infra Deployment
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.INFRA_DEPLOY_PAT }}
          repository: ${{ github.repository_owner }}/cloudnotes-infra
          event-type: app-deploy
          client-payload: '{"image_tag": "${{ github.sha }}", "actor": "${{ github.actor }}"}'
